<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Expense Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#1976d2">
</head>
<body>
  <div id="updateBanner" class="update-banner" role="status" aria-live="polite" hidden>
    <div class="update-banner-text">New version available — Refresh</div>
    <button id="refreshAppBtn" class="update-banner-btn">Refresh</button>
  </div>
  <div class="container">
    <h1 class="title">Parking Expense Tracker</h1>
    <div class="card total-expense">
      <div class="card-title">Total Parking Expense</div>
      <div class="card-value" id="totalExpense">₹0</div>
    </div>
    <div class="card live-timer">
      <div class="card-title">Live Parking Timer</div>
      <div class="card-value" id="liveTimer">Not Parked</div>
    </div>
    <div class="card current-cost">
      <div class="card-title">Current Cost</div>
      <div class="card-value" id="currentCost">₹0</div>
    </div>
    <button id="mainActionBtn" class="main-action park">PARK VEHICLE</button>
    <a href="history.html" class="history-link">View History</a>
  </div>
  <script src="app.js"></script>
</body>
</html>
